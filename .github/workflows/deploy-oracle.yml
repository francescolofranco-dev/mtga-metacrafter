name: deploy-oracle
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-oracle
  cancel-in-progress: false

permissions:
  contents: read

# Required repo secrets (Settings → Secrets and variables → Actions):
#   ORACLE_HOST     — public IP or domain of the Oracle VM
#   ORACLE_USER     — usually "ubuntu" on Oracle's Ubuntu image
#   ORACLE_SSH_KEY  — full private key contents (PEM, with BEGIN/END lines)
#
# Optional:
#   ORACLE_PORT     — SSH port (default 22)

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Don't fire if the Oracle host secret isn't set yet — keeps the workflow
    # quiet until the user finishes Oracle onboarding.
    if: ${{ vars.ORACLE_ENABLED == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Cross-compile ARM64 binary
        env:
          CGO_ENABLED: 0
          GOOS: linux
          GOARCH: arm64
        run: |
          go build -trimpath -ldflags="-s -w" \
            -o build/mtga-metacrafter \
            ./cmd/mtga-metacrafter
          ls -la build/

      - name: Install SSH key
        env:
          SSH_KEY: ${{ secrets.ORACLE_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/oracle
          chmod 600 ~/.ssh/oracle
          ssh-keyscan -p "${{ secrets.ORACLE_PORT || 22 }}" \
            -t rsa,ecdsa,ed25519 "${{ secrets.ORACLE_HOST }}" \
            >> ~/.ssh/known_hosts 2>/dev/null

      - name: Upload binary to VM
        run: |
          scp -P "${{ secrets.ORACLE_PORT || 22 }}" \
              -i ~/.ssh/oracle \
              build/mtga-metacrafter \
              "${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }}:/tmp/mtga-metacrafter.new"

      - name: Swap binary and restart service
        run: |
          ssh -p "${{ secrets.ORACLE_PORT || 22 }}" \
              -i ~/.ssh/oracle \
              "${{ secrets.ORACLE_USER }}@${{ secrets.ORACLE_HOST }}" \
              'set -e
               sudo install -o metacrafter -g metacrafter -m 0755 \
                 /tmp/mtga-metacrafter.new /opt/mtga-metacrafter/mtga-metacrafter
               sudo systemctl restart mtga-metacrafter
               sleep 2
               sudo systemctl is-active --quiet mtga-metacrafter && echo "service active"'

      - name: Smoke-test /healthz
        run: |
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 5 "http://${{ secrets.ORACLE_HOST }}/healthz" >/dev/null; then
              echo "healthz OK"
              exit 0
            fi
            sleep 3
          done
          echo "healthz check failed after retries" >&2
          exit 1
