name: deploy-fly
# Fly.io deploy — kept as a fallback only.
# Disabled on push so we don't spam failed runs while the trial is expired.
# If you re-activate Fly and want auto-deploy back, change `on:` to:
#   push: { branches: [main] }
#   workflow_dispatch:
on:
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
