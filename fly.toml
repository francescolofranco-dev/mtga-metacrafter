# fly.toml app configuration file generated for mtga-metacrafter on 2026-05-25T07:03:22Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mtga-metacrafter'
primary_region = 'fra'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATA_DIR = '/data'
  FORMATS = 'standard,pioneer'
  LISTEN_ADDR = ':8080'
  LOG_LEVEL = 'info'
  REFRESH_PERIOD = '24h'

[[mounts]]
  source = 'mtga_metacrafter_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 200
    soft_limit = 100

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
