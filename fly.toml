# Fly.io config for MTGA MetaCrafter. The `app` name must be globally unique;
# `flyctl launch --copy-config --no-deploy` will rename it for you if needed.

app = "mtga-metacrafter"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  LISTEN_ADDR = ":8080"
  DATA_DIR = "/data"
  REFRESH_PERIOD = "168h"
  LOG_LEVEL = "info"

[[mounts]]
  source = "mtga_metacrafter_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 100
    hard_limit = 200

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1
